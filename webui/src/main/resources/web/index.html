<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggregating Publisher</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Aggregating Publisher</h1>
            <button id="logout-btn" onclick="logout()">Logout</button>
        </header>

        <main>
            <section class="publish-section">
                <h2>Publish To</h2>
                <div id="publishers-list" class="publishers-grid">
                    <!-- Publishers will be loaded here -->
                </div>
            </section>

            <section class="artifacts-section">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Published Artifacts</h2>
                    <button id="clear-artifacts-btn" onclick="clearArtifacts()">Clear</button>
                </div>
                <ul id="artifacts-list">
                    <li>Loading...</li>
                </ul>
            </section>
        </main>

        <div id="notification-area"></div>

        <footer>
            <p>Aggregating Publisher Web UI</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
